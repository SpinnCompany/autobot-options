# ─── options.autobotsignal.io — Host-Level Nginx Site Config ───
#
# Place on GCP server at: /etc/nginx/sites-available/options.autobotsignal.io
# Then: sudo ln -s /etc/nginx/sites-available/options.autobotsignal.io /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Two deployment modes (uncomment the one you use):
#   MODE A: Reverse proxy to Docker container (port 8095)
#   MODE B: Serve static files directly from /var/www/options.autobotsignal.io/
#
# ═══════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
  listen 80;
  server_name options.autobotsignal.io;

  # Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

# ── HTTPS ──────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name options.autobotsignal.io;

  # SSL — managed by certbot
  ssl_certificate     /etc/letsencrypt/live/options.autobotsignal.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/options.autobotsignal.io/privkey.pem;
  include              /etc/letsencrypt/options-ssl/options-nginx-ssl.conf;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 256;

  # ── MODE A: Reverse proxy to Docker container ────────────
  location / {
    proxy_pass http://127.0.0.1:8095;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── MODE B: Serve static files directly ──────────────────
  # (Comment out MODE A above and uncomment below)
  #
  # root /var/www/options.autobotsignal.io;
  # index index.html;
  #
  # location = /index.html {
  #   add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
  #   add_header Pragma "no-cache";
  #   add_header Expires "0";
  # }
  #
  # location /assets/ {
  #   expires 1y;
  #   add_header Cache-Control "public, immutable";
  # }
  #
  # location / {
  #   try_files $uri $uri/ /index.html;
  # }

  # Health check (no auth required)
  location /health {
    access_log off;
    return 200 "OK";
    add_header Content-Type text/plain;
  }
}
